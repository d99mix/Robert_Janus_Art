<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt — Robert Janus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/jpeg" href="Galeria/glowne.jpg" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ['Cormorant Garamond', 'Georgia', 'serif'], sans: ['Jost', 'sans-serif'] },
          colors: { canvas: '#080808', ink: '#e8e0d4', muted: '#7a7265', gold: '#c9a96e', 'gold-light': '#e8c98a' },
        },
      },
    };
  </script>
</head>
<body>

<nav class="glass-nav fixed top-0 left-0 right-0 z-50">
  <div class="max-w-6xl mx-auto px-6 md:px-10 flex items-center justify-between h-16 md:h-20">
    <a href="index.html" class="flex flex-col leading-none">
      <span class="font-serif text-ink text-lg font-light tracking-wide">Robert</span>
      <span class="font-sans text-muted text-[0.6rem] tracking-[0.3em] uppercase font-light -mt-1">Janus</span>
    </a>
    <div class="hidden md:flex items-center gap-8">
      <a href="index.html" class="nav-link">Strona główna</a>
      <a href="o-mnie.html" class="nav-link">O mnie</a>
      <a href="galeria.html" class="nav-link">Galeria</a>
      <a href="kontakt.html" class="nav-link active">Kontakt</a>
    </div>
    <button id="hamburger" class="md:hidden flex flex-col gap-1.5 p-2" aria-label="Menu">
      <span class="block w-6 h-px bg-muted transition-all" id="h1"></span>
      <span class="block w-4 h-px bg-muted transition-all ml-auto" id="h2"></span>
      <span class="block w-6 h-px bg-muted transition-all" id="h3"></span>
    </button>
  </div>
  <div id="mobile-menu" class="md:hidden border-t border-gold/10">
    <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col gap-6">
      <a href="index.html" class="nav-link text-base" onclick="closeMobileMenu()">Strona główna</a>
      <a href="o-mnie.html" class="nav-link text-base" onclick="closeMobileMenu()">O mnie</a>
      <a href="galeria.html" class="nav-link text-base" onclick="closeMobileMenu()">Galeria</a>
      <a href="kontakt.html" class="nav-link text-base" onclick="closeMobileMenu()">Kontakt</a>
    </div>
  </div>
</nav>

<section class="contact-page">
  <div class="contact-page__inner reveal">
    <p class="contact-page__label">Kontakt</p>
    <h1 class="contact-page__title">Skontaktuj się</h1>
    <p class="contact-page__subtitle">Kliknij ikonę:</p>
    <div class="contact-page__links">
      <a class="contact-page__icon-link" href="tel:+48662560217" aria-label="Telefon" title="Telefon: 662-560-217">
        <span class="contact-page__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 5.15 12.8 19.79 19.79 0 0 1 2.08 4.15 2 2 0 0 1 4.07 2h3a2 2 0 0 1 2 1.72c.12.9.34 1.78.67 2.62a2 2 0 0 1-.45 2.11L8 9.72a16 16 0 0 0 6.28 6.28l1.27-1.27a2 2 0 0 1 2.11-.45c.84.33 1.72.55 2.62.67A2 2 0 0 1 22 16.92z"></path>
          </svg>
        </span>
      </a>
      <a class="contact-page__icon-link" href="mailto:janus_obrazy@interia.pl" aria-label="E-mail" title="E-mail: janus_obrazy@interia.pl">
        <span class="contact-page__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.5" y="5" width="19" height="14" rx="2.2"></rect>
            <path d="M21.5 7L12 13.5 2.5 7"></path>
          </svg>
        </span>
      </a>
      <a class="contact-page__icon-link" href="https://facebook.com/janusobrazy" target="_blank" rel="noopener noreferrer" aria-label="Facebook" title="Facebook: facebook.com/janusobrazy">
        <span class="contact-page__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M13.5 8.5V6.9c0-.9.3-1.4 1.4-1.4H17V2.1c-.4 0-1.7-.1-3.2-.1-3.1 0-5.2 1.9-5.2 5.5v1H6v3.8h2.6V22h4.9v-9.7h3.2l.5-3.8h-3.7z"></path>
          </svg>
        </span>
      </a>
    </div>
  </div>
</section>

<footer class="py-10 border-t border-gold/10 text-center">
  <p class="font-sans font-light text-muted text-xs tracking-[0.3em] uppercase">
    © 2026 Robert Janus &nbsp;·&nbsp; Wszelkie prawa zastrzeżone
  </p>
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  let menuOpen = false;
  hamburger.addEventListener('click', () => {
    menuOpen = !menuOpen;
    mobileMenu.classList.toggle('open', menuOpen);
    document.getElementById('h1').style.transform = menuOpen ? 'rotate(45deg) translate(4px, 4px)' : '';
    document.getElementById('h2').style.opacity = menuOpen ? '0' : '1';
    document.getElementById('h3').style.transform = menuOpen ? 'rotate(-45deg) translate(4px, -4px)' : '';
  });
  function closeMobileMenu() {
    menuOpen = false;
    mobileMenu.classList.remove('open');
    document.getElementById('h1').style.transform = '';
    document.getElementById('h2').style.opacity = '1';
    document.getElementById('h3').style.transform = '';
  }
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
</script>
</body>
</html>
