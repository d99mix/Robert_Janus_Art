<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt — Robert Janus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ['Cormorant Garamond', 'Georgia', 'serif'], sans: ['Jost', 'sans-serif'] },
          colors: { canvas: '#080808', ink: '#e8e0d4', muted: '#7a7265', gold: '#c9a96e', 'gold-light': '#e8c98a' },
        },
      },
    };
  </script>
</head>
<body>

<nav class="glass-nav fixed top-0 left-0 right-0 z-50">
  <div class="max-w-6xl mx-auto px-6 md:px-10 flex items-center justify-between h-16 md:h-20">
    <a href="index.html" class="flex flex-col leading-none">
      <span class="font-serif text-ink text-lg font-light tracking-wide">Robert</span>
      <span class="font-sans text-muted text-[0.6rem] tracking-[0.3em] uppercase font-light -mt-1">Janus</span>
    </a>
    <div class="hidden md:flex items-center gap-8">
      <a href="index.html" class="nav-link">Strona główna</a>
      <a href="o-mnie.html" class="nav-link">O mnie</a>
      <a href="galeria.html" class="nav-link">Galeria</a>
      <a href="kontakt.html" class="nav-link active">Kontakt</a>
    </div>
    <button id="hamburger" class="md:hidden flex flex-col gap-1.5 p-2" aria-label="Menu">
      <span class="block w-6 h-px bg-muted transition-all" id="h1"></span>
      <span class="block w-4 h-px bg-muted transition-all ml-auto" id="h2"></span>
      <span class="block w-6 h-px bg-muted transition-all" id="h3"></span>
    </button>
  </div>
  <div id="mobile-menu" class="md:hidden border-t border-gold/10">
    <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col gap-6">
      <a href="index.html" class="nav-link text-base" onclick="closeMobileMenu()">Strona główna</a>
      <a href="o-mnie.html" class="nav-link text-base" onclick="closeMobileMenu()">O mnie</a>
      <a href="galeria.html" class="nav-link text-base" onclick="closeMobileMenu()">Galeria</a>
      <a href="kontakt.html" class="nav-link text-base" onclick="closeMobileMenu()">Kontakt</a>
    </div>
  </div>
</nav>

<section class="pt-28 md:pt-36 pb-24 md:pb-36 px-6 md:px-10 max-w-4xl mx-auto">
  <div class="reveal text-center mb-16">
    <p class="font-sans font-light text-gold tracking-[0.4em] text-xs uppercase mb-4">Kontakt</p>
    <h1 class="font-serif text-4xl md:text-5xl font-light text-ink leading-tight mb-6">
      Porozmawiajmy<br /><em>o sztuce</em>
    </h1>
    <p class="font-sans font-light text-muted text-sm leading-relaxed max-w-md mx-auto">
      Jestem otwarty na zlecenia, wystawy i współpracę twórczą. Odpisuję w ciągu 48 godzin.
    </p>
  </div>

  <form class="reveal space-y-5 mb-16" onsubmit="handleSubmit(event)">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
      <div>
        <label class="block font-sans font-light text-muted text-xs tracking-widest uppercase mb-2">Imię</label>
        <input type="text" placeholder="Jan Kowalski" class="form-field w-full px-4 py-3.5 font-sans font-light text-sm rounded-none" />
      </div>
      <div>
        <label class="block font-sans font-light text-muted text-xs tracking-widest uppercase mb-2">E-mail</label>
        <input type="email" placeholder="jan@email.com" class="form-field w-full px-4 py-3.5 font-sans font-light text-sm rounded-none" />
      </div>
    </div>
    <div>
      <label class="block font-sans font-light text-muted text-xs tracking-widest uppercase mb-2">Wiadomość</label>
      <textarea rows="6" placeholder="Twoja wiadomość..." class="form-field w-full px-4 py-3.5 font-sans font-light text-sm rounded-none resize-none"></textarea>
    </div>
    <div class="text-center pt-4">
      <button type="submit" class="submit-btn">
        <span>Wyślij wiadomość</span>
      </button>
    </div>
  </form>

  <div class="reveal text-center">
    <p class="font-sans font-light text-muted text-xs tracking-[0.4em] uppercase mb-8">Znajdź mnie</p>
    <div class="flex items-center justify-center gap-8">
      <a href="#" aria-label="Instagram" class="group flex flex-col items-center gap-2 transition-all duration-300">
        <div class="w-12 h-12 border border-gold/20 flex items-center justify-center group-hover:border-gold/60 transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-muted group-hover:text-gold transition-colors duration-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <span class="font-sans font-light text-muted text-[0.6rem] tracking-[0.3em] uppercase group-hover:text-gold transition-colors duration-300">Instagram</span>
      </a>
      <a href="#" aria-label="Behance" class="group flex flex-col items-center gap-2 transition-all duration-300">
        <div class="w-12 h-12 border border-gold/20 flex items-center justify-center group-hover:border-gold/60 transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-muted group-hover:text-gold transition-colors duration-300" viewBox="0 0 24 24" fill="currentColor">
            <path d="M7.5 11.5c1.1 0 2-.9 2-2s-.9-2-2-2H4v4h3.5zm.5 1.5H4v4.5h4c1.4 0 2.5-1.1 2.5-2.25S9.4 13 8 13zm8.5-5.5h-5v1.5h5V7.5zM22 13c0-.28-.02-.55-.07-.81H15c.13.67.53 1.24 1.12 1.63l-1.25 1.26C14.1 14.5 13.5 13.3 13.5 12c0-2.48 2.02-4.5 4.5-4.5 2.48 0 4.5 2.02 4.5 4.5H22zm-4.5-2.5c-.83 0-1.5.67-1.5 1.5h3c0-.83-.67-1.5-1.5-1.5z"/>
          </svg>
        </div>
        <span class="font-sans font-light text-muted text-[0.6rem] tracking-[0.3em] uppercase group-hover:text-gold transition-colors duration-300">Behance</span>
      </a>
      <a href="mailto:robert@janus.art" aria-label="E-mail" class="group flex flex-col items-center gap-2 transition-all duration-300">
        <div class="w-12 h-12 border border-gold/20 flex items-center justify-center group-hover:border-gold/60 transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-muted group-hover:text-gold transition-colors duration-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/>
          </svg>
        </div>
        <span class="font-sans font-light text-muted text-[0.6rem] tracking-[0.3em] uppercase group-hover:text-gold transition-colors duration-300">E-mail</span>
      </a>
    </div>
  </div>
</section>

<footer class="py-10 border-t border-gold/10 text-center">
  <p class="font-sans font-light text-muted text-xs tracking-[0.3em] uppercase">
    © 2024 Robert Janus &nbsp;·&nbsp; Wszelkie prawa zastrzeżone
  </p>
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  let menuOpen = false;
  hamburger.addEventListener('click', () => {
    menuOpen = !menuOpen;
    mobileMenu.classList.toggle('open', menuOpen);
    document.getElementById('h1').style.transform = menuOpen ? 'rotate(45deg) translate(4px, 4px)' : '';
    document.getElementById('h2').style.opacity = menuOpen ? '0' : '1';
    document.getElementById('h3').style.transform = menuOpen ? 'rotate(-45deg) translate(4px, -4px)' : '';
  });
  function closeMobileMenu() {
    menuOpen = false;
    mobileMenu.classList.remove('open');
    document.getElementById('h1').style.transform = '';
    document.getElementById('h2').style.opacity = '1';
    document.getElementById('h3').style.transform = '';
  }
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
  function handleSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector('.submit-btn span');
    btn.textContent = 'Wysłano ✓';
    e.target.querySelector('.submit-btn').style.borderColor = 'rgba(201,169,110,0.8)';
    setTimeout(() => { btn.textContent = 'Wyślij wiadomość'; }, 3000);
  }
</script>
</body>
</html>
